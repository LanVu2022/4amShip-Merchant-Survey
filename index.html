<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>4amShip Merchant Survey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Outfit, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #F4F8FB 0%, #EEF6F5 50%, #F8F4EC 100%);
            color: #111827;
            min-height: 100vh;
            padding: 2.5rem 1.5rem;
        }

        .container {
            max-width: 64rem;
            margin: 0 auto;
        }

        .card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            margin-bottom: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 1rem;
            color: #111827;
        }
        .brand-orange {
            color: #F86931;
        }
        .brand-blue {
            color: #223F61;
        }

        .subtitle {
            font-size: 1.125rem;
            color: #4b5563;
            max-width: 48rem;
            margin: 0 auto 2rem auto;
            line-height: 1.6;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            max-width: 48rem;
            margin: 0 auto 2rem auto;
        }

        @media (min-width: 768px) {
            .info-grid {
                grid-template-columns: 1fr 1fr;
                gap: 1.5rem;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
            text-align: left;
        }

        input, textarea, select {
            border-radius: 1rem;
            border: 1px solid #d1d5db;
            background-color: #f9fafb;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            color: #111827;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #43BFA1;
            box-shadow: 0 0 0 2px rgba(67, 191, 161, 0.2);
            background-color: white;
        }

        input::placeholder, textarea::placeholder {
            color: #9ca3af;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #223F61;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .question-block {
            margin-bottom: 1.75rem;
        }

        .question-text {
            font-size: 1.125rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: #111827;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        @media (min-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.75rem;
            }
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background-color: #f9fafb;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            color: #374151;
        }

        .option-label:hover {
            background-color: #f3f4f6;
            border-color: #43BFA1;
        }

        input[type="checkbox"] {
            width: 1.125rem;
            height: 1.125rem;
            margin: 0;
            cursor: pointer;
            accent-color: #F86931;
            flex-shrink: 0;
        }

        textarea {
            width: 100%;
            min-height: 80px;
            resize: vertical;
        }

        .other-input {
            margin-top: 0.5rem;
            margin-left: 1.75rem;
            display: none;
        }

        .other-input.show {
            display: block;
        }

        .other-input input {
            width: 100%;
        }

        .submit-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 2rem auto 0;
            padding: 1rem 2rem;
            background-color: #43BFA1;
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-message {
            text-align: center;
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
        }

        .status-success {
            background-color: #d1fae5;
            color: #065f46;
        }

        .status-error {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .status-loading {
            background-color: #e0e7ff;
            color: #3730a3;
        }

        hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><span class="brand-blue">4</span><span class="brand-orange">am</span><span class="brand-blue">Ship Merchant Survey</span></h1>
        <p class="subtitle">Help us understand your shipping workflow, operational challenges, and automation needs so we can build a better shipping platform for growing e-commerce businesses.</p>
        
        <div class="info-grid">
            <div class="form-group">
                <label>Business Email *</label>
                <input type="email" id="businessEmail" placeholder="you@company.com">
            </div>
            <div class="form-group">
                <label>Company Name *</label>
                <input type="text" id="companyName" placeholder="Your Company">
            </div>
        </div>
    </div>

    <div id="surveyContainer"></div>

    <button class="submit-btn" id="submitBtn">Submit & Help Shape 4amShip</button>
    <div id="statusMessage" class="status-message" style="display: none;"></div>
</div>

<script>
    // ==================== 修改后的问卷数据 ====================
    const questionsData = [
        {
            section: 'Merchant Background',
            items: [
                { question: '1. What type of business do you operate?', field: 'businessType', options: ['D2C Brand', 'Marketplace Seller', '3PL / Warehouse', 'Retailer', 'Agency / Aggregator', 'Other'] },
                { question: '2. Which marketplaces or platforms do you currently use?', field: 'platforms', options: ['Shopify', 'Amazon', 'TikTok Shop', 'WooCommerce', 'Walmart', 'eBay', 'Etsy', 'Other'] },
                { question: '3. Approximately how many orders do you ship monthly?', field: 'monthlyOrders', options: ['< 500', '501-2,000', '2,001-5,000', '5,001-10,000', '10,001-25,000', '25,000+'] },
            ]
        },
         {
            section: 'Shipping Operations',
            items: [
                { question: '4. Which shipping platforms/tools do you currently use?', field: 'shippingTools', options: ['ShipStation', 'EasyPost', 'Pirate Ship', 'Shippo', 'EasyShip', 'In-house tools', 'Other','Not using any tools'] },
                { question: '5. Which shipping features are you currently using? Click all that apply.', field: 'ShippingFeatures', options: ['Batch label printing', 'Rate comparison', 'Order management', 'Tracking updates', 'Inventory management', 'Returns management', 'Custom automation rules', 'International shipping', 'Branded tracking', 'Analytics dashboard', 'Other', 'N/A'] },
                { question: '6. What are your biggest shipping pain points? Click all that apply.', field: 'painPoints', options: ['High shipping costs', 'Manual operational workload', 'Slow label generation', 'Tracking visibility', 'Carrier reliability', 'Address errors', 'Limited automation', 'Poor customer support', 'Difficult integrations', 'Billing reconciliation', 'Other'] },
                { question: '7. Where do you currently ship out of?', field: 'shippingLocation', options: ['Home', 'Self-operated warehouse', '3PL (Third Party Logistics)', 'Multiple locations', 'Other'] },
                { question: '8. How do you typically generate shipping labels?', field: 'labelGeneration', options: ['One label at a time', 'Bulk label generation', 'Automated through rules', 'Generated by warehouse staff','Generated by 3PL partner', 'Other'] },
                { question: '9. Do you currently use any rules or filters to process orders before label generation?', field: 'useOrderRules', options: ['Yes', 'No'] },
                { question: '9a. If yes, what types of rules do you use? Click all that apply.', field: 'orderRules', options: ['Route orders by SKU', 'Automatically select cheapest shipping method','Automatically select fastest shipping method', 'Hold orders for manual review', 'Split orders by inventory location','Combine orders by same recipient address','Other','N/A'] },
                { question: '10. How do you currently decide which shipping method to use for each order?', field: 'carrierSelection', options: ['Always use the same shipping method', 'Manually compare rates each time', 'System automatically picks the cheapest/fastest', 'Use different carriers for different warehouses', 'Use different carriers for different product types', '3PL decides', 'Other'] },
                { question: '11. What happens when shipment exceptions occur (e.g., address issue, failed delivery, carrier issues)?', field: 'exceptionHandling', options: ['Manually review and correct each one', 'Managed through shipping platform', 'Carrier handles most issues', 'We rarely get exceptions', 'Other'] },
            ]                       
        },
        {
            section: 'System Features & Integrations',
            items: [
                { question: '12. Which kind of the following system do you integrate with your shipping platform? Click all that apply.', field: 'systemIntegrations', options: ['WMS (Warehouse Management System)', 'OMS (Order Management System)', 'ERP (Enterprise Resource Planning)', '3PL / Fulfillment Center Integration', 'Inventory Management System', 'CRM (Customer Relationship Management)', 'Custom / In-house System', 'Other'] },
                { question: '13. Please specify the names of the systems you selected above (e.g., "Oracle NetSuite ERP", "Manhattan WMS", "Salesforce CRM"):', field: 'systemNames', textarea: true, placeholder: 'Please list the specific system names for each integration you selected...' },
            ]
        }
    ];


    // ==================== 存储答案 ====================
    let answers = {};

    function initAnswers() {
        for (const section of questionsData) {
            for (const item of section.items) {
                if (item.field) {
                    if (item.options) {
                        answers[item.field] = [];
                    } else if (item.textarea) {
                        answers[item.field] = '';
                    }
                }
            }
        }
    }

    // ==================== 渲染问卷 ====================
    function renderSurvey() {
        const container = document.getElementById('surveyContainer');
        if (!container) return;

        let html = '';
        for (const section of questionsData) {
            html += `<div class="card"><div class="section-title">${section.section}</div>`;
            for (const item of section.items) {
                const fieldName = item.field;
                html += `<div class="question-block"><div class="question-text">${item.question}</div>`;

                if (item.options) {
                    html += `<div class="options-grid" id="grid-${fieldName}">`;
                    for (const opt of item.options) {
                        const escapedOpt = opt.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                        const isOther = (opt === 'Other');
                        html += `
                            <div>
                                <label class="option-label">
                                    <input type="checkbox" value="${escapedOpt}" data-field="${fieldName}" data-is-other="${isOther}">
                                    <span>${opt}</span>
                                </label>
                        `;
                        if (isOther) {
                            html += `
                                <div class="other-input" id="other-${fieldName}">
                                    <input type="text" placeholder="Please specify..." data-field="${fieldName}">
                                </div>
                            `;
                        }
                        html += `</div>`;
                    }
                    html += `</div>`;
                } else if (item.textarea) {
                    html += `<textarea id="textarea-${fieldName}" placeholder="${item.placeholder || 'Type your answer here...'}"></textarea>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
        }
        container.innerHTML = html;
        
        // 绑定复选框变化事件
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', function(e) {
                const fieldName = this.getAttribute('data-field');
                const value = this.value;
                const isOther = this.getAttribute('data-is-other') === 'true';
                
                if (!answers[fieldName]) answers[fieldName] = [];
                
                if (this.checked) {
                    if (!answers[fieldName].includes(value)) {
                        answers[fieldName].push(value);
                    }
                    if (isOther) {
                        const otherDiv = document.getElementById(`other-${fieldName}`);
                        if (otherDiv) otherDiv.classList.add('show');
                    }
                } else {
                    const index = answers[fieldName].indexOf(value);
                    if (index > -1) {
                        answers[fieldName].splice(index, 1);
                    }
                    if (isOther) {
                        const otherDiv = document.getElementById(`other-${fieldName}`);
                        if (otherDiv) {
                            otherDiv.classList.remove('show');
                            const otherInput = otherDiv.querySelector('input');
                            if (otherInput) {
                                otherInput.value = '';
                                const otherField = `${fieldName}_other`;
                                delete answers[otherField];
                            }
                        }
                    }
                }
            });
        });
        
        // 绑定 Other 输入框事件
        document.querySelectorAll('.other-input input').forEach(input => {
            input.addEventListener('input', function(e) {
                const fieldName = this.getAttribute('data-field');
                const otherField = `${fieldName}_other`;
                if (this.value.trim()) {
                    answers[otherField] = this.value.trim();
                } else {
                    delete answers[otherField];
                }
            });
        });
        
        // 绑定文本域事件
        for (const section of questionsData) {
            for (const item of section.items) {
                if (item.textarea && item.field) {
                    const ta = document.getElementById(`textarea-${item.field}`);
                    if (ta) {
                        ta.addEventListener('input', function(e) {
                            answers[item.field] = e.target.value;
                        });
                    }
                }
            }
        }
    }

    // ==================== 提交到 Google Sheet ====================
    // ⚠️ 请替换为你的 Apps Script URL
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/你的ID/exec';

    async function submitToGoogleSheet() {
        const businessEmail = document.getElementById('businessEmail')?.value.trim() || '';
        const companyName = document.getElementById('companyName')?.value.trim() || '';
        
        if (!businessEmail || !companyName) {
            showStatus('Please fill in both Business Email and Company Name.', 'error');
            return;
        }
        
        if (!businessEmail.includes('@')) {
            showStatus('Please enter a valid email address.', 'error');
            return;
        }
        
        const submissionData = {
            businessEmail: businessEmail,
            companyName: companyName
        };
        
        // 合并 Other 内容到主字段
        for (const key in answers) {
            let value = answers[key];
            
            if (Array.isArray(value)) {
                const otherKey = `${key}_other`;
                const otherValue = answers[otherKey];
                
                if (otherValue && otherValue.trim()) {
                    const hasOther = value.includes('Other');
                    if (hasOther) {
                        value = value.filter(v => v !== 'Other');
                        value.push(`Other: ${otherValue}`);
                    } else if (otherValue.trim()) {
                        value.push(`Other: ${otherValue}`);
                    }
                }
                submissionData[key] = value.join(', ');
            } else {
                submissionData[key] = value || '';
            }
        }
        
        const params = new URLSearchParams();
        for (const [key, value] of Object.entries(submissionData)) {
            params.append(key, value);
        }
        
        showStatus('Submitting, please wait...', 'loading');
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: params.toString()
            });
            
            showStatus('Thank you! Your survey has been submitted successfully.', 'success');
            
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('textarea').forEach(ta => ta.value = '');
            document.querySelectorAll('.other-input').forEach(div => div.classList.remove('show'));
            document.getElementById('businessEmail').value = '';
            document.getElementById('companyName').value = '';
            initAnswers();
            
        } catch (error) {
            console.error('Submission Error:', error);
            showStatus('Submission failed: ' + (error.message || 'Network error'), 'error');
        } finally {
            submitBtn.disabled = false;
        }
    }
    
    function showStatus(msg, type) {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.style.display = 'block';
        statusDiv.textContent = msg;
        statusDiv.className = `status-message status-${type}`;
        if (type !== 'loading') {
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }
    }
    
    initAnswers();
    renderSurvey();
    
    const submitBtn = document.getElementById('submitBtn');
    if (submitBtn) {
        submitBtn.addEventListener('click', submitToGoogleSheet);
    }
</script>
</body>
</html>
